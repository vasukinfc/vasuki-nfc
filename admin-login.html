<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI Admin Login</title>
<style>
body { font-family: Arial; background: linear-gradient(135deg,#ff416c,#ff4b2b); height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background:white; padding:30px; border-radius:12px; width:320px; box-shadow:0 6px 20px rgba(0,0,0,0.15); }
.login-card h2 { text-align:center; margin-bottom:20px; }
input { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:12px; background:#ff416c; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
button:hover { opacity:0.9; }
</style>
</head>
<body>

<div class="login-card">
  <h2>Admin Login</h2>
<input type="email" id="username" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>
<script type="module">

import { db, ref, set, get } from "./firebase.js";

window.addCustomer = async function(){

  const id = document.getElementById("customId").value.trim();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const instagram = document.getElementById("instagram").value;
  const website = document.getElementById("website").value;
  const location = document.getElementById("location").value;

  if(!id){
    alert("Please enter custom ID");
    return;
  }

  if(!name || !phone){
    alert("Name and Phone required");
    return;
  }

  const snapshot = await get(ref(db,'customers/'+id));

  if(snapshot.exists()){
    alert("ID already exists! Choose another");
    return;
  }

  set(ref(db,'customers/'+id), {
    name, phone, instagram, website, location, scans:0
  })
  .then(()=> {
    document.getElementById("successMsg").innerText = "Customer added successfully!";
  })
  .catch(err => alert("Error: " + err));
}

</script>
</body>
</html>
