<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI Admin Panel</title>
<style>
body { font-family: Arial; background:#f5f5f5; display:flex; justify-content:center; padding:40px; }
.panel { background:white; padding:30px; border-radius:12px; width:400px; box-shadow:0 6px 20px rgba(0,0,0,0.15); }
.panel h2 { text-align:center; margin-bottom:25px; color:#ff416c; }
input { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:12px; background:#ff416c; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
button:hover { opacity:0.9; }
.success-msg { color:green; font-weight:bold; margin-top:10px; text-align:center; }
</style>
</head>
<body>

<div class="panel">
  <h2>Add Customer</h2>
  <input id="customId" placeholder="Custom ID (ex: vasukil123)">
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="whatsapp" placeholder="WhatsApp Number (optional)">
  <input id="instagram" placeholder="Instagram">
  <input id="website" placeholder="Website">
  <input id="location" placeholder="Location">
  <button onclick="addCustomer()">Add Customer</button>
  <div class="success-msg" id="successMsg"></div>
</div>

<script type="module">

import { db, ref, set, get } from "./firebase.js";

window.addCustomer = async function(){

  const id = document.getElementById("customId").value.trim();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const instagram = document.getElementById("instagram").value;
  const website = document.getElementById("website").value;
  const location = document.getElementById("location").value;

  if(!id){
    alert("Please enter custom ID");
    return;
  }

  if(!name || !phone){
    alert("Name and Phone required");
    return;
  }

  const snapshot = await get(ref(db,'customers/'+id));

  if(snapshot.exists()){
    alert("ID already exists! Choose another");
    return;
  }

 set(ref(db,'customers/'+id), {
  name,
  phone,
  whatsapp,
  instagram,
  website,
  location,
  scans:0
})
  .then(()=> {
    document.getElementById("successMsg").innerText = "Customer added successfully!";
  })
  .catch(err => alert("Error: " + err));
}

</script>

</body>
</html>
