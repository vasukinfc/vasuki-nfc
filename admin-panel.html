<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel - Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

.header {
  background: #111827;
  color: white;
  padding: 15px 20px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card h3 {
  margin: 0;
  color: #6b7280;
  font-size: 14px;
}

.card p {
  font-size: 22px;
  font-weight: bold;
  margin-top: 5px;
}

.table {
  width: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #f9fafb;
}

.chartBox {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
}

</style>
</head>
<body>

<div class="header">📊 Live Admin Dashboard</div>

<div class="container">

  <!-- STATS -->
  <div class="cards">
    <div class="card">
      <h3>Total Customers</h3>
      <p id="totalCustomers">0</p>
    </div>

    <div class="card">
      <h3>Total Scans</h3>
      <p id="totalScans">0</p>
    </div>

    <div class="card">
      <h3>Avg Scans</h3>
      <p id="avgScans">0</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="chartBox">
    <canvas id="scanChart"></canvas>
  </div>

  <!-- TABLE -->
  <div class="table" style="margin-top:20px;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Scans</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { db, ref, onValue } from "./firebase.js";

let chart;

function renderChart(labels, data){
  const ctx = document.getElementById("scanChart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Scans",
        data: data,
        backgroundColor: "#6366F1"
      }]
    }
  });
}

const customersRef = ref(db, "customers");

onValue(customersRef, (snapshot)=>{
  const data = snapshot.val() || {};

  let total = 0;
  let list = [];

  for(let key in data){
    list.push(data[key]);
    total += data[key].scans || 0;
  }

  document.getElementById("totalCustomers").innerText = list.length;
  document.getElementById("totalScans").innerText = total;
  document.getElementById("avgScans").innerText = list.length ? (total / list.length).toFixed(1) : 0;

  // table
  document.getElementById("tableBody").innerHTML = list.map(c=>`
    <tr>
      <td>${c.name || "-"}</td>
      <td>${c.phone || "-"}</td>
      <td>${c.scans || 0}</td>
    </tr>
  `).join("");

  // chart
  renderChart(
    list.map(c=>c.name),
    list.map(c=>c.scans || 0)
  );
});

</script>

</body>
</html>
